# Training entrypoint for the 4×GH200 dynamics run with the large LAM (67M).
# Used in tandem with configs/dynamics_large_lam.yaml.

# wandb
use_wandb: true
wandb_project: tinyworlds

# dataset
dataset: ZELDA
preload_ratio: 1.0   # load all cached frames (Zelda h5 is ~1.8 GB on disk, fits easily in RAM)

# shared model params (must match the loaded VT/LAM checkpoints — both are 64×64, patch=4)
patch_size: 4
context_length: 4
frame_size: 64
latent_dim: 5     # video tokenizer FSQ latent dim
num_bins: 4       # video tokenizer FSQ bins per dim  (vocab = 4^5 = 1024)
n_actions: 4      # large LAM was trained with n_actions=4

# performance
amp: true
tf32: true
compile: false    # repo TODO: PyTorch 2.11 inductor bug with this model

# distributed launch (torchrun): 4× GH200 with DDP
distributed:
  use_ddp: true
  use_fsdp: false
  reshard_after_forward: false
nproc_per_node: 4
standalone: true

# stage configs
video_tokenizer_config: configs/video_tokenizer.yaml
latent_actions_config: configs/latent_actions.yaml
dynamics_config: configs/dynamics_large_lam.yaml

# only the dynamics stage runs — VT and LAM are loaded from existing checkpoints
run_video_tokenizer: false
run_latent_actions: false
run_dynamics: true

optimizer: "adamw"
muon_momentum: 0.95
muon_backend_steps: 5

use_moe: false
num_experts: 4
top_k_experts: 2
moe_aux_loss_coeff: 0.01

# AdamW: β2=0.95 inherited from the post-spike investigation in the prior dynamics.yaml.
adam_beta1: 0.9
adam_beta2: 0.95
adam_eps: 1e-8

# Eval loss — chronological 80/10/10 split (test partition never loaded).
enable_eval_loss: true
train_ratio: 0.8
eval_ratio: 0.1
eval_loss_interval: 1000    # every 1k optimizer steps (matches checkpoint cadence)
