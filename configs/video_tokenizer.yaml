# Training
batch_size_per_gpu: 64    # was 350: (B*P)*H overflowed flash-attn grid limit (~65535); 64*64*8=32768 is safe
gradient_accumulation_steps: 1
n_updates: 40000
learning_rate: 0.001
log_interval: 2500

# these can vary but for convenience, here
embed_dim: 32
num_heads: 8
hidden_dim: 128
num_blocks: 4

