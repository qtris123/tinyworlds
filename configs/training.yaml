# wandb
use_wandb: true
wandb_project: tinyworlds

# dataset
dataset: ZELDA
preload_ratio: 1.0

# shared model params
patch_size: 4
context_length: 4
frame_size: 64
latent_dim: 5 # for video tokenizer
num_bins: 4 # for video tokenizer
n_actions: 4

# performance
amp: true
tf32: true
compile: false

# distributed launch (torchrun)
distributed: 
  use_ddp: False
  use_fsdp: False
  reshard_after_forward: False
nproc_per_node: 1 # how many GPUs per node
standalone: true # if we're using one node, this eliminates extraneous processes

# stage configs
video_tokenizer_config: configs/video_tokenizer.yaml
latent_actions_config: configs/latent_actions.yaml
dynamics_config: configs/dynamics.yaml

# which stages to run
run_video_tokenizer: true
run_latent_actions: true
run_dynamics: true

# optimizer: "adamw" (default) or "muon" (Newton-Schulz orthogonalized)
optimizer: "adamw"
muon_momentum: 0.95
muon_backend_steps: 5

# MoE (dynamics model only): replaces SwiGLU FFN with top-k routed experts
use_moe: false
num_experts: 4
top_k_experts: 2
moe_aux_loss_coeff: 0.01

# Eval loss — opt-in feature; disabled by default so the original pipeline is unchanged.
# When enabled, the dataset is split chronologically into three partitions:
#   [0, train_ratio)             → training
#   [train_ratio, +eval_ratio)   → eval  (loss logged every eval_loss_interval steps)
#   [train_ratio+eval_ratio, 1)  → test  (never loaded during training)
# A data_partition.yaml file is written to each stage's output directory with
# the exact frame/clip counts used for each partition.
enable_eval_loss: true
train_ratio: 0.8      # fraction of raw frames for training
eval_ratio: 0.1       # fraction for eval  (test = 1 - train_ratio - eval_ratio)
eval_loss_interval: 0 # steps between eval-loss computations; 0 = use log_interval
